<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="calculadora-container">
      <h2>Calculadora</h2>

      <div class="input-group">
        <input type="number" id="numero1" placeholder="Primeiro número" />
        <input type="number" id="numero2" placeholder="Segundo número" />
      </div>

      <div class="button-group">
        <button id="btnSoma" title="Somar">+</button>
        <button id="btnSub" title="Subtrair">-</button>
        <button id="btnMult" title="Multiplicar">×</button>
        <button id="btnDiv" title="Dividir">÷</button>
        <button id="btnPot" title="Potência">xʸ</button>
        <button id="btnRad" title="Raiz Enésima">√</button>
        <button id="btnLimpar" title="Limpar Tudo" class="btn-acao">C</button>
        <button id="btnDel" title="Deletar" class="btn-acao">⌫</button>
      </div>

      <div id="display">Resultado: 0</div>
    </div>
    
    <script src="script.js"></script>
  </body>
</html>
