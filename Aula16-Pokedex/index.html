<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Pokedex</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <h1 class="text-center mb-4">Pokedex</h1>

                <!-- BARRA DE BUSCA -->
                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <div class="input-group">
                            <input type="text" id="campoBusca" class="form-control"
                                placeholder="Nome do pokemon (ex: pikachu)">
                            <button id="btnBuscar" class="btn btn-primary">Buscar</button>
                        </div>
                    </div>
                </div>

                <!-- SPINNER DE CARREGAMENTO (escondido por padrao) -->
                <div id="divSpinner" class="text-center mb-4 d-none">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Carregando...</span>
                    </div>
                    <p class="text-muted small mt-2">Buscando pokemon...</p>
                </div>

                <!-- AREA DO CARD DE RESULTADO -->
                <div id="divResultado" class="mb-4">
                    <!-- card sera injetado aqui -->
                </div>

                <!-- HISTORICO -->
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="h6 text-muted mb-3">Buscas recentes</h2>
                        <div id="divHistorico" class="d-flex flex-wrap gap-2">
                            <!-- chips serao injetados aqui -->
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
