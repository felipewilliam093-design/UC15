<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Catalogo de Personagens</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container py-4">
      <h1 class="text-center mb-4">Catalogo de Personagens</h1>

      <!-- FORMULARIO PARA ADICIONAR -->
      <div class="card mb-4 shadow-sm">
        <div class="card-body">
          <h2 class="h5 mb-3">Adicionar personagem</h2>
          <div class="row g-2">
            <div class="col-md-3">
              <input
                type="text"
                id="campoNome"
                class="form- control"
                placeholder="Nome"
              />
            </div>
            <div class="col-md-3">
              <input
                type="text"
                id="campoClasse"
                class="form- control"
                placeholder="Classe"
              />
            </div>
            <div class="col-md-2">
              <input
                type="number"
                id="campoLevel"
                class="form- control"
                placeholder="Level"
              />
            </div>
            <div class="col-md-4">
              <input
                type="text"
                id="campoHabilidades"
                class="form- control"
                placeholder="Habilidades (separadas por virgula)"
              />
            </div>
          </div>
          <div class="row g-2 mt-2">
            <div class="col-md-3">
              <input
                type="number"
                id="campoHp"
                class="form- control"
                placeholder="HP"
              />
            </div>
            <div class="col-md-3">
              <input
                type="number"
                id="campoMana"
                class="form control"
                placeholder="Mana"
              />
            </div>
            <div class="col-md-3">
              <input
                type="number"
                id="campoAtaque"
                class="form control"
                placeholder="Ataque"
              />
            </div>
            <div class="col-md-3">
              <button id="btnAdicionarPersonagem" class="btn btn primary w-100">
                Adicionar
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- AREA DE CATALOGO -->
      <div id="catalogoPersonagens" class="row g-3">
        <!-- cards serao injetados aqui pelo JavaScript -->
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
