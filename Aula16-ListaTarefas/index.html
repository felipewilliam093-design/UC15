<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Lista de Tarefas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <h1 class="text-center mb-4">Lista de Tarefas</h1>

                <div class="card mb-4 shadow-sm">
                    <div class="card-body">
                        <div class="input-group">
                            <input type="text" id="inputTarefa" class="form-control" placeholder="Digite uma tarefa...">
                            <button id="btnAdicionar" class="btn btn-primary">Adicionar</button>
                        </div>
                    </div>
                </div>

                <ul id="listaTarefas" class="list-group">
                    <!-- tarefas serao injetadas aqui pelo JavaScript -->
                </ul>

                <p class="text-center text-muted mt-3 small">
                    Suas tarefas ficam salvas no navegador.
                </p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
